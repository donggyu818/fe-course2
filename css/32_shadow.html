<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Style</title>
    <meta name="description" content="Shadow Style">
    <style>
        .text {
            text-shadow: 10px 5px 0 rgba(97, 89, 89, 0.5);
        }
        .box {
            width: 500px;
            height: 300px;
            background-color: aquamarine;
            box-shadow: 27px 29px 21px -7px rgba(122,116,116,0.75);
            -webkit-box-shadow: 27px 29px 21px -7px rgba(122,116,116,0.75);
            -moz-box-shadow: 27px 29px 21px -7px rgba(122,116,116,0.75);
        }
    </style>
</head>
<body>
    <h1>Shadow Style</h1>
    <h2 class="text">Text-Shadow</h2>
    <h2 class="box">Box-Shadow</h2>
</body>
</html>
