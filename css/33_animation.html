<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Style</title>
    <meta name="description" content="Animation Style">
    <style>
        .box {
            width: 200px; height: 200px;
            border: 1px solid blue;
        }
        .box:hover {
            /* animation: name duration timing-function delay iteration-count direction fill-mode; */
            animation: changeColor 3s 0s 3;
        }
        @keyframes changeColor {
            from {
                /* 애니메이션 시작 시 스타일 정의 */
                background-color: aqua;
            }
            /* 중간에 애니메이션을 넣고 싶으면 00% {} 쓰면 됨. 예_절반 시점에서 진행 => 50% {} */
            50% { background-color: yellow;}
            to {
                /* 애니메이션 종료 시 스타일 정의 */
                background-color: tomato;
            }
        }
        .box-image {
            width: 100%; height: 500px;
            background-image: url(../images/pattern1.jpg);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
        }
        img {
            width: 200px; height: 200px;
        }
        .img1, .img2, .img3, .img4, .img5 {
            opacity: 0;
            animation: fadeInUp 3s ease forwards;
        }
        .img1 {
            animation-delay: 1s;
        }
        .img2 {
            animation-delay: 1.5s;
        }
        .img3 {
            animation-delay: 2s;
        }
        .img4 {
            animation-delay: 2.5s;
        }
        .img5 {
            animation-delay: 3s;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <h1>Animation Style</h1>
    <div class="box">box Animation</div>
    <div class="box-image">
        <img src="../images/favicon.ico" alt="나무이미지" class="img1">
        <img src="../images/favicon.ico" alt="나무이미지" class="img2">
        <img src="../images/favicon.ico" alt="나무이미지" class="img3">
        <img src="../images/favicon.ico" alt="나무이미지" class="img4">
        <img src="../images/favicon.ico" alt="나무이미지" class="img5">
    </div>
</body>
</html>
