<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Selector</title>
    <meta name="description" content="ID Selector">
    <style>
        /* id 선택자는 중복 선택해서 사용하지 않는 것을 추천함!! */
        * {
            margin: 0;
        }
        #h1 {
            /* 글자색: tomato, 가로: 300px, 높이: 400px, 배경색: green*/
            color: tomato;
            width: 300px;
            height: 400px;
            background-color: green;
        }
        #h2 {
            /* 글자색: tomato, 배경색: yellow*/
            color: tomato;
            background-color: yellow;
        }
        #h3 {
            /* 글자색: blue, 배경색: yellow*/
            color: blue;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1 id="h1">ID Selector #1</h1>
    <h1 id="h2">ID Selector #2</h1>
    <h1 id="h1">ID Selector #3</h1>
</body>
</html>
