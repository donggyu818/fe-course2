<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRE</title>
</head>
<body>
    <h1>웹 개발 교육 상담 문의</h1>
    <p>HTML, CSS, JavaScript, React, 프론트엔드 교육 과정에 대해 
    궁금한 내용을 남겨주세요. 담당자가 확인 후 안내해드립니다.</p>
    <fieldset>
        <legend>상담 신청 정보</legend>
        <dl>
            <label for="name">이름 *</label>
            <input type="text" name="name" placeholder="이름을 입력하세요">
        </dl>
        <dl>실명을 입력해 주세요.</dl>
        <dl>
            <label for="email">이메일 *</label>
            <input type="text" name="email" placeholder="example@email.com">
        </dl>
        <dl>답변을 받을 이메일 주소를 입력해 주세요.</dl>
        <dl>
            <label for="phone">연락처</label>
        <input type="text" name="phone" placeholder="010-0000-0000">
        </dl>
        <dl>
            <label for="choose">관심 과정 *</label>
            <select name="choose">
                <option value="선택">선택하세요</option>
            </select>
        </dl>
        <dl>
            <label for="neyong">문의 내용 *</label>
            <textarea name="neyong" 
            placeholder="궁금한 내용을 자세히 입력해 주세요"></textarea>
        </dl>
        <dl>
            예: 수업 일정, 수강 대상, 비용, 프로젝트 중심 수업 여부 등
        </dl>
        <dl>
            <label for="check"></label>
            <input type="checkbox" name="check">
            <span>개인정보 수집 및 이용에 동의합니다. *</span>
        </dl>
        <dl>
            <button type="button">상담 문의 보내기</button>
        </dl>
    </fieldset>
</body>
</html>
