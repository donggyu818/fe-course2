<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbucks</title>
    <meta name="description" content="Starbucks">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        /* * {background-color: rgb(246, 245, 239)} */
        header {
            /* border: 1px solid blue; */
            width: 1000px;
            margin: auto;
            display: flex;
            justify-content: space-between;
        }
        /* .header-menu-top li {border-left: 1px solid #666;}
        .no-line {border-left: none;} 이거 안됨 */
        .header-menu-top ul, .header-menu-bottom ul {
            display: flex;
            list-style: none;
            justify-content: right;
            font-family: "Nanum Gothic";
        }
        .header-menu-top ul {gap: 20px; font-size: 0.8em;} 
        .header-menu-bottom ul {
            gap: 25px; font-size: 0.9em;
            letter-spacing: 0.5px;
        }
        .header-menu-top ul a, .header-menu-bottom ul a {
            text-decoration: none;
            color: #333;
        }
        .header-menu-top li:last-child {
            border: 2px solid silver;
            border-radius: 5px;
            padding: 5px;
            background-color: white;
        }
        .header-menu-top li:last-child i {
            font-size: 1.2rem;
            background-color: white;
            font-weight: 700;
        }
        .header-menu-top li:last-child input {
            display: none;
        }
        main {
            margin-top: 20px;
            width: 100%; height: 32.3vw;
            background-image: url(https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_bg_260220.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            /* border: 5px solid brown; */
        }
        .main-image {
            display: flex;
            /* border: 2px solid blue; */
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
        }
        .main-image-logo img {
            /* border: 2px solid green; */
            /* justify-content: center; */
            /* align-items: center; */
            display: block;
        }
        .main-image-button {
            color: rgb(172, 133, 186);
            border: 2px solid rgb(172, 133, 186);
            background-color: rgba(225, 225, 225, 0);
            border-radius: 7px;
            margin-top: 30px;
            margin-left: 150px;
            padding: 5px 30px;
            font-size: 1.1em;
        }
        .main-image-drink {
            /* display: flex; */
            /* border: 3px solid black; */
            height: 500px;
            /* align-items: center;
            justify-content: center; */
        }
        .main-image-drink img {
            /* border: 2px solid yellow; */
        }
        .drink-img1 {height: 373px;}
        .drink-img2 {height: 312px;}
        .drink-img3 {height: 393px;}
        .drink-img4 {height: 393px;}
        .drink-img5 {height: 446px;}
    </style>
</head>
<body>
    <header>
        <div class="header-logo">
            <img src="https://www.starbucks.co.kr/common/img/common/logo.png" alt="starbucks">
        </div>
        <div class="header-menu">
            <nav class="header-menu-top">
                <ul>
                    <li><a href="https://www.starbucks.co.kr/login/login.do">Sign In</a></li>
                    <li><a href="https://www.starbucks.co.kr/login/login.do?redirect_url=%2Fmy%2Findex.do">My Starbucks</a></li>
                    <li><a href="https://www.starbucks.co.kr/util/index.do">Customer Service & Ideas</a></li>
                    <li><a href="https://www.starbucks.co.kr/store/store_map.do">Find a Store</a></li>
                    <li>
                        <input type="text" >
                        <a href="#"><i class="fas fa-search"></i></a>
                    </li>
                </ul>
            </nav>
            <nav class="header-menu-bottom">
                <ul>
                    <li><a href="#">COFFEE</a></li>
                    <li><a href="#">MENU</a></li>
                    <li><a href="#">STORE</a></li>
                    <li><a href="#">ESG</a></li>
                    <li><a href="#">STARBUCKS REWARDS</a></li>
                    <li><a href="#">CORPORATE SALES</a></li>
                    <li><a href="#">WHAT'S NEW</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <div class="main-image">
            <div class="main-image-logo">
                <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_slogan_260220.png" alt="bloom">
                <button class="main-image-button">자세히보기</button>
            </div>
            <div class="main-image-drink">
                <img class="drink-img1" src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink01_260220.png" alt="슈크림 라떼">
                <img class="drink-img2" src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink02_260220.png" alt="슈 폼 라떼">
                <img class="drink-img3" src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink03_260220.png" alt="슈크림 말차 라떼">
                <img class="drink-img4" src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink04_260220.png" alt="슈크림 딸기 라떼">
                <img class="drink-img5" src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink05_260220.png" alt="체리 블라썸 백도 크림 프라푸치노">
            </div>
        </div>
        <div>
            <img src="https://www.starbucks.co.kr/common/img/main/line_notice_bg.jpg" alt="black and white">
        </div>
    </main>
</body>
</html>
