<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute Selector</title>
    <meta name="description" content="Attribute Selector">
    <style>
        a[href="http://www.naver.com"] {
            color: red;
            text-decoration: none;
        }
        a[target="_self"] {
            color: green;
        }
        /* 네이버와 다음 동시에 줄 때 위의 a[href=구글 해도 되지만 아래처럼 해도 됨.]*/
        /* a[target="_blank"] {
            background-color: yellow;
        } */
        /* ^= : "inner"로 시작하는 모든 class 속성을 대상으로 함*/
        a[class^="inner"] {
            background-color: yellow;
        }
        a[href="#"] {
            color: tomato; text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>Attribute Selector</h1>
    <a href="#" class="inner_1">테스트1</a>
    <a href="http://www.naver.com" target="_blank">네이버</a>
    <a href="http://www.google.com" target="_self">구글</a>
    <a href="http://www.daum.com" target="_blank">다음</a>
    <a href="#" class="inner_2">테스트2</a>
</body>
</html>
