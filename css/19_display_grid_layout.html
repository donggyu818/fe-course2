<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display-Grid Layout</title>
    <meta name="description" content="Display-Grid Layout">
    <style>
        div {border: 1px solid blue;}
        .grid-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 2fr;
            /* grid-template-columns: repeat(4, 1fr)} */

            grid-template-rows: 100px auto;
            gap: 10px;
            align-items: center; /*셀 기준으로 세로 정렬*/
            justify-content: center; /* 셀 기준으로 가로 정렬*/
        }
        .list-grid-wrap {
            border: 1px solid red;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* ul 태그에서는 repeat만 가능! */
            list-style-type: none;
        }
        .item-grid {
            grid-column: span 3; /* 컬럼 병합 : 1~3 까지 병합됨. */
        }
        /* img[alt="img1"], img[alt="img2"] {width: 100px; height: 100px;}
        img[alt="img3"] {width: 300px;},*/
        .list-grid-wrap img {
        width: 300px; height: 300px;
        }
    </style>
</head>
<body>
    <h1>Display-Grid Layout</h1>
    <div class="grid-wrap">
        <div class="item-grid">1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
    </div>
    <ul class="list-grid-wrap">
        <li class="item-grid"><img src="../images/img01_seo.png" alt="img1"></li>
        <li><img src="../images/img01_seo.png" alt="img2"></li>
        <li><img src="../images/Mad.jpg" alt="img3"></li>
        <li><img src="../images/img01_seo.png" alt="img2"></li>
        <li><img src="../images/Mad.jpg" alt="img3"></li>
        <li><img src="../images/img01_seo.png" alt="img2"></li>
        <li><img src="../images/Mad.jpg" alt="img3"></li>
    </ul>
</body>
</html>
