<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star animation</title>
    <link rel="stylesheet" href="star-ani.css">
    <style>
        /* main { border: 1px solid red;} */
    </style>
</head>
<body>
    <main>
        <!-- 상단 배너 이미지 -->
        <div class="main-top-banner">
            <div class="main-top-bg-wrap">
                <div class="main-top-banner-inner">
                    <div class="main-top-slogan"> 
                        <!-- 얘를 position: absolute 주고 싶은데 main-top-banner-inner로 하면 
                        양식이 다르게 나옴 그래서 그 위의 부모인 wrap 에게 줌. (꼭 직계부모가 아니어도 됨) -->
                        <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_slogan_260220.png" 
                            alt="slogan image" class="slogan">
                    </div>
                    <div class="main-top-menus set-01">
                        <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink01_260220.png" 
                            alt="menu img1">
                    </div>
                    <div class="main-top-menus set-02">
                        <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink02_260220.png" 
                            alt="menu img1">
                    </div>
                    <div class="main-top-menus set-03">
                        <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink03_260220.png" 
                            alt="menu img1">
                    </div>
                    <div class="main-top-menus set-04">
                        <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink04_260220.png" 
                            alt="menu img1">
                    </div>
                    <div class="main-top-menus set-05">
                        <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink05_260220.png" 
                            alt="menu img1">
                    </div>
                    <div class="main-top-menus btn-slogan">
                        <a href="#">자세히 보기</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
